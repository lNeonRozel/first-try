<svg width="400" height="400" viewBox="0 0 400 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Shop Bakery logo</title>
  <desc>Чорно-біле лого пекарні з колоском та написом SHOP BAKERY</desc>

  <rect width="400" height="400" fill="white"/>

  <g transform="translate(200, 200)">

    <circle cx="0" cy="0" r="118" fill="none" stroke="#111" stroke-width="2"/>
    <circle cx="0" cy="0" r="108" fill="none" stroke="#111" stroke-width="0.8"/>

    <path d="M -80 28 Q 0 -10 80 28" fill="none" stroke="#111" stroke-width="1.2"/>

    <g transform="translate(0, -20)">
      <line x1="0" y1="10" x2="0" y2="48" stroke="#111" stroke-width="1.8"/>

      <ellipse cx="-8" cy="0" rx="5" ry="10" fill="#111" transform="rotate(-25 -8 0)"/>
      <ellipse cx="8" cy="0" rx="5" ry="10" fill="#111" transform="rotate(25 8 0)"/>

      <ellipse cx="-12" cy="-14" rx="5" ry="10" fill="#111" transform="rotate(-20 -12 -14)"/>
      <ellipse cx="12" cy="-14" rx="5" ry="10" fill="#111" transform="rotate(20 12 -14)"/>

      <ellipse cx="-8" cy="-27" rx="4.5" ry="9" fill="#111" transform="rotate(-15 -8 -27)"/>
      <ellipse cx="8" cy="-27" rx="4.5" ry="9" fill="#111" transform="rotate(15 8 -27)"/>

      <ellipse cx="0" cy="-38" rx="5" ry="9" fill="#111"/>
    </g>

    <text x="0" y="66" text-anchor="middle" font-family="Georgia, serif" font-size="19" letter-spacing="8" font-weight="700" fill="#111">SHOP</text>
    <text x="0" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="11" letter-spacing="5" font-weight="400" fill="#111">BAKERY</text>

    <line x1="-42" y1="76" x2="-28" y2="76" stroke="#111" fill="none" stroke-width="0.8"/>
    <line x1="28" y1="76" x2="42" y2="76" stroke="#111" fill="none" stroke-width="0.8"/>

  </g>
</svg>
